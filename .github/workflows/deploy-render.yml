name: CI/CD Pipeline for Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Generate test report
        run: ./gradlew jacocoTestReport

      - name: Build JAR
        run: ./gradlew bootJar -x test

      - name: Build Docker image
        run: |
          docker build -t ticket-booking-system:${{ github.sha }} .
          docker tag ticket-booking-system:${{ github.sha }} ticket-booking-system:latest

      - name: Trigger Render Deploy
        run: |
          curl -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys

      - name: Wait for Render deployment
        run: |
          echo "Waiting for Render deployment to complete..."
          sleep 120
          
          MAX_RETRIES=20
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            STATUS=$(curl -s \
              -H "Accept: application/json" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys | \
              jq -r '.[0].status')
          
            echo "Deployment status: $STATUS"
          
            if [ "$STATUS" = "live" ]; then
              echo "Deployment is live!"
              exit 0
            elif [ "$STATUS" = "failed" ]; then
              echo "Deployment failed!"
              exit 1
            fi
          
            sleep 15
            RETRY_COUNT=$((RETRY_COUNT+1))
          done
          
          echo "Timeout waiting for deployment"
          exit 1

      - name: Healthcheck
        run: |
          echo "Running healthcheck..."
          sleep 10
          
          MAX_RETRIES=15
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f https://${{ secrets.RENDER_SERVICE_NAME }}.onrender.com/actuator/health; then
              echo "Healthcheck passed!"
              exit 0
            fi
            echo "Healthcheck failed, retrying in 10 seconds... (Attempt $((RETRY_COUNT+1))/$MAX_RETRIES)"
            sleep 10
            RETRY_COUNT=$((RETRY_COUNT+1))
          done
          
          echo "Healthcheck failed after $MAX_RETRIES attempts"
          exit 1