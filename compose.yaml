services:
  db:
    image: postgres:17.2
    container_name: ticket_booking_db
    environment:
      POSTGRES_DB: ticket_booking_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ticket_booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticket_network

  app:
    build: .
    container_name: ticket_booking_app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ticket_network

volumes:
  postgres_data:

networks:
  ticket_network: